<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.A.S.T. - Tracking & Médias</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">F.A.S.T.</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Rechercher un film, une série, un animé...">
            <div id="searchResults" class="search-results"></div>
        </div>
    </header>

    <nav>
        <button class="nav-btn active" data-tab="all">Tout</button>
        <button class="nav-btn" data-tab="watchlist">À voir</button>
        <button class="nav-btn" data-tab="watching">En cours</button>
        <button class="nav-btn" data-tab="finished">Terminé</button>
        <button class="nav-btn" data-tab="ai-rec">IA Recommandations</button>
    </nav>

    <main id="mainGrid" class="media-grid">
        </main>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalBody">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
