<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.A.S.T. | Expérience Streaming</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-top">
            <div class="logo">F.A.S.T<span>.</span></div>
            <div class="header-controls">
                <button id="themeToggle" class="icon-btn">🌓</button>
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Rechercher...">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
        </div>
        <div id="searchResults" class="search-results-floating"></div>
    </header>

    <nav class="main-nav">
        <button class="nav-btn active" data-tab="all">Tout</button>
        <button class="nav-btn" data-tab="watchlist">À voir</button>
        <button class="nav-btn" data-tab="watching">En cours</button>
        <button class="nav-btn" data-tab="finished">Terminé</button>
        <button class="nav-btn ai-btn" data-tab="ai-rec">✨ Recommandations IA</button>
    </nav>

    <main class="content-area">
        <div id="mainGrid" class="media-grid"></div>
    </main>

    <div id="detailsModal" class="modal">
        <div class="modal-content card-3d">
            <span class="close-btn">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
